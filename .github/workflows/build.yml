name: Build and Release

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    # 仅限 Windows — 依赖 WinRT API (windows crate) 和 Windows 系统字体
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: invoice-qr-extractor-windows
          path: target/release/InvoiceQRExtractor.exe

  # 打 tag 时自动创建 Release
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: invoice-qr-extractor-windows

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: InvoiceQRExtractor.exe
          body: |
            ## 发票PDF二维码提取工具 v${{ github.ref_name }}

            ### 使用说明
            1. 下载 `InvoiceQRExtractor.exe`
            2. 双击直接运行
            3. 选择 PDF 发票文件 → 自动提取二维码 → 导出 CSV

            ### 系统要求
            - Windows 10+
            - 无需安装任何依赖
